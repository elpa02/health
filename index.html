function fbReady(){ return !!(_fbDb && _fbUid); }

/* Load Firebase SDK scripts sequentially */
function fbLoad(cb){
  if(typeof firebase!=="undefined"){ cb(); return; }
  var urls=[
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js",
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js",
    "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"
  ];
  function loadNext(i){
    if(i>=urls.length){ cb(); return; }
    var s=document.createElement("script");
    s.src=urls[i];
    s.onload=function(){ loadNext(i+1); };
    s.onerror=function(){ cb(new Error("Αποτυχία φόρτωσης Firebase SDK.")); };
    document.head.appendChild(s);
  }
  loadNext(0);
}

/* ── Granular write: write/delete a single item ── */
function fbWriteItem(collection, id, data){
  if(!fbReady()) return;
  _fbDb.ref("users/"+_fbUid+"/"+collection+"/"+id).set(data).catch(function(){});
}
function fbDeleteItem(collection, id){
  if(!fbReady()) return;
  _fbDb.ref("users/"+_fbUid+"/"+collection+"/"+id).remove().catch(function(){});
}

/* ── Granular write for non-array data (settings) ── */
function fbWriteObj(key, data){
  if(!fbReady()) return;
  _fbDb.ref("users/"+_fbUid+"/"+key).set(data).catch(function(){});
}

/* ── Initial full push (first connect) ── */
function fbPushAll(appData, cb){
  if(!fbReady()){ if(cb) cb(new Error("Not connected")); return; }
  /* Convert arrays to objects keyed by id for Firebase */
  var payload={};
  ["exams","glucose","ketones","supps","suppLog","foods","meals","exercises","exTemplates"].forEach(function(k){
    if(appData[k]&&appData[k].length){
      payload[k]={};
      appData[k].forEach(function(item){ if(item&&item.id) payload[k][item.id]=item; });
    }
  });
  payload.settings = appData.settings||{};
  _fbDb.ref("users/"+_fbUid).set(payload)
    .then(function(){ if(cb) cb(null); })
    .catch(function(e){ if(cb) cb(e); });
}

/* ── Pull all data (first connect on new device) ── */
function fbPullAll(cb){
  if(!fbReady()){ if(cb) cb(new Error("Not connected"),null); return; }
  _fbDb.ref("users/"+_fbUid).once("value")
    .then(function(snap){
      var data=snap.val()||{};
      var result={};
      ["exams","glucose","ketones","supps","suppLog","foods","meals","exercises","exTemplates"].forEach(function(k){
        result[k] = data[k] ? Object.values(data[k]) : [];
      });
      result.settings = data.settings||{};
      /* Write to localStorage immediately for persistence across reloads */
      var lsKeys={exams:"ht3-exams",glucose:"ht3-glucose",ketones:"ht3-ketones",
        supps:"ht3-supps",suppLog:"ht3-suppLog",foods:"ht3-foods",
        meals:"ht3-meals",exercises:"ht3-exercises",exTemplates:"ht3-exTemplates",settings:"ht3-settings"};
      Object.keys(lsKeys).forEach(function(k){
        if(result[k]!==undefined) try{localStorage.setItem(lsKeys[k],JSON.stringify(result[k]));}catch(e){}
      });
      if(cb) cb(null, result);
    })
    .catch(function(e){ if(cb) cb(e,null); });
}

/* ── Set up real-time listeners for each collection ── */
function fbListenAll(onData){
  if(!fbReady()) return;
  ["exams","glucose","ketones","supps","suppLog","meals","exercises"].forEach(function(k){
    _fbDb.ref("users/"+_fbUid+"/"+k).on("value", function(snap){
      if(_applying) return;
      var obj=snap.val();
      var arr=obj ? Object.values(obj) : [];
      onData(k, arr);
    });
  });
}

function fbConnect(onStatus, cb){
  onStatus("connecting");
  fbLoad(function(err){
    if(err){ onStatus("error"); if(cb) cb(err); return; }
    if(!_fbApp){
      _fbApp=firebase.initializeApp(FB_CFG);
      _fbDb=firebase.database();
      _fbAuth=firebase.auth();
    }
    function afterAuth(){
      /* Connection state listener */
      _fbDb.ref(".info/connected").on("value",function(s){
        if(!s.val()) onStatus("offline");
      });
      /* Visibility change reconnect */
      document.addEventListener("visibilitychange",function(){
        if(!document.hidden && _fbDb) _fbDb.goOnline();
      });
      onStatus("connected");
      if(cb) cb(null, _fbUid);
    }
    /* If UID already set, skip auth */
    if(_fbUid){ afterAuth(); return; }
    /* Try Google Sign-In */
    var provider = new firebase.auth.GoogleAuthProvider();
    _fbAuth.signInWithPopup(provider).then(function(cr){
      _fbUid=cr.user.uid;
      localStorage.setItem("ht3-fb-uid",_fbUid);
      localStorage.setItem("ht3-fb-email",cr.user.email||"");
      localStorage.setItem("ht3-fb-name",cr.user.displayName||"");
      afterAuth();
      /* Auto-pull data after Sign-In and reload */
      setTimeout(function(){
        fbPullAll(function(err,data){
          if(err||!data) return;
          var lsKeys={exams:"ht3-exams",glucose:"ht3-glucose",ketones:"ht3-ketones",
            supps:"ht3-supps",suppLog:"ht3-suppLog",foods:"ht3-foods",
            meals:"ht3-meals",exercises:"ht3-exercises",exTemplates:"ht3-exTemplates",settings:"ht3-settings"};
          Object.keys(lsKeys).forEach(function(k){
            if(data[k]!==undefined) try{localStorage.setItem(lsKeys[k],JSON.stringify(data[k]));}catch(e){}
          });
          window.location.reload();
        });
      }, 800);
    }).catch(function(){
      /* Fallback: anonymous */
      _fbAuth.signInAnonymously().then(function(cr){
        _fbUid=cr.user.uid;
        localStorage.setItem("ht3-fb-uid",_fbUid);
        afterAuth();
      }).catch(function(e){ onStatus("error"); if(cb) cb(e); });
    });
  });
}

  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){ res(r.result.split(",")[1]); };
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){ res(r.result); };
    r.onerror=rej;

  });
}

/* ═══════════════════ AI API ═══════════════════ */
function callAI(prompt, b64, aiSet){
  if(aiSet.provider==="gemini"){
    if(!aiSet.geminiKey) return Promise.reject(new Error("Λείπει Gemini API Key — ⚙️ Ρυθμίσεις"));
    var parts = b64 ? [{inline_data:{mime_type:"application/pdf",data:b64}},{text:prompt}] : [{text:prompt}];
    return fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+aiSet.geminiKey,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({contents:[{parts:parts}]})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.error) throw new Error(d.error.message);
      return d.candidates[0].content.parts[0].text;
    });
  }
  if(aiSet.provider==="claude"){
    if(!aiSet.claudeKey) return Promise.reject(new Error("Λείπει Anthropic API Key — ⚙️ Ρυθμίσεις"));
    var cnt = b64 ? [{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}] : [{type:"text",text:prompt}];
    return fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":aiSet.claudeKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:cnt}]})
    }).then(function(r){return r.json();}).then(function(d){
      if(d.error) throw new Error(d.error.message);
      return d.content.map(function(i){return i.text||"";}).join("");
    });
  }
  return Promise.reject(new Error("Άγνωστος provider"));
}

/* ═══════════════════ CHART COMPONENT ═══════════════════ */
function LineChartCJ(props){
  var canvasRef=useRef(null);
  var chartRef=useRef(null);
  useEffect(function(){
    if(!canvasRef.current||!props.data||!props.data.length) return;
    if(chartRef.current){ chartRef.current.destroy(); }
    var ctx=canvasRef.current.getContext("2d");
    chartRef.current=new Chart(ctx,{
      type:"line",
      data:{
        labels:props.data.map(function(d){return d.label;}),
        datasets:[{
          label:props.label||"",
          data:props.data.map(function(d){return d.value;}),
          borderColor:props.color||CLR.primary,
          backgroundColor:(props.color||CLR.primary)+"25",
          borderWidth:2.5,pointRadius:4,pointHoverRadius:6,tension:0.3,fill:props.fill||false,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.y+(props.unit?" "+props.unit:"");}}}},
        scales:{
          y:{grid:{color:"#f1f5f9"},ticks:{font:{size:11}}},
          x:{grid:{display:false},ticks:{font:{size:11}}}
        }
      }
    });
    if(props.refMax||props.refMin){
      Chart.register({id:"refLines_"+Math.random(),afterDraw:function(chart){
        if(chart.canvas!==canvasRef.current) return;
        var yS=chart.scales.y, xS=chart.scales.x;
        if(!yS||!xS) return;
        var ctx2=chart.ctx;
        ctx2.save(); ctx2.setLineDash([6,3]); ctx2.lineWidth=1.5;
        if(props.refMax){
          var yMax=yS.getPixelForValue(props.refMax);
          ctx2.strokeStyle=CLR.err; ctx2.beginPath(); ctx2.moveTo(xS.left,yMax); ctx2.lineTo(xS.right,yMax); ctx2.stroke();
          ctx2.fillStyle=CLR.err; ctx2.font="10px system-ui"; ctx2.fillText("max",xS.right-26,yMax-3);
        }
        if(props.refMin){
          var yMin=yS.getPixelForValue(props.refMin);
          ctx2.strokeStyle=CLR.warn; ctx2.beginPath(); ctx2.moveTo(xS.left,yMin); ctx2.lineTo(xS.right,yMin); ctx2.stroke();
          ctx2.fillStyle=CLR.warn; ctx2.font="10px system-ui"; ctx2.fillText("min",xS.right-26,yMin+12);
        }
        ctx2.restore();
      }});
      chartRef.current.update();
    }
    return function(){ if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
  },[props.data]);
  return React.createElement("div",{style:{height:props.height||200,position:"relative"}},
    React.createElement("canvas",{ref:canvasRef})
  );
}

            if(window._fbSetStatus) window._fbSetStatus("synced");
            if(window._fbSetSyncedAt) window._fbSetSyncedAt(new Date());
            setTimeout(function(){ _applying=false; }, 1000);
          });
          /* Start real-time listeners for ongoing changes */
          fbListenAll(function(key, arr){
            if(_applying) return;
            _applying=true;
            var setters={
              exams:     function(a){ lsSet(LS.exams,a);     setExams(a); },
              glucose:   function(a){ lsSet(LS.glucose,a);   setGlucose(a); },
              ketones:   function(a){ lsSet(LS.ketones,a);   setKetones(a); },
              supps:     function(a){ lsSet(LS.supps,a);     setSupps(a); },

              setters[key](arr);
              if(window._fbSetStatus) window._fbSetStatus("synced");
              if(window._fbSetSyncedAt) window._fbSetSyncedAt(new Date());
            }
            setTimeout(function(){ _applying=false; }, 500);
          });
        });
      }, 1000);
    }
    /* Auto-reconnect when page becomes visible again (screen unlock, tab switch) */
    function onVisible(){
      if(document.hidden) return;
      if(_fbUid && _fbDb){

        setTimeout(function(){
          if(_fbDb) _fbDb.ref(".info/connected").once("value").then(function(s){

          });
        }, 2000);
      } else if(_fbUid && !_fbDb){
        fbConnect(setFbStatus, function(){});

  function doUpload(cb){
    setFbSyncing(true);

      if(err){ setFbSyncing(false); if(cb) cb(err); return; }
      fbPushAll(getSnapshot(), function(err2){
        setFbSyncing(false);
        if(err2){ if(cb) cb(err2); return; }

          };
          if(setters[key]){ setters[key](arr); if(window._fbSetStatus) window._fbSetStatus("synced"); }

  function doDownload(cb){
    setFbSyncing(true);
    fbConnect(setFbStatus, function(err){
      if(err){ setFbSyncing(false); if(cb) cb(err); return; }
      fbPullAll(function(err2,data){
        setFbSyncing(false);
        if(err2){ if(cb) cb(err2); return; }
        if(!data){ if(cb) cb(new Error("Δεν βρέθηκαν δεδομένα")); return; }
        /* MERGE cloud data with local data - keep all unique IDs */
        _applying = true;
        function mergeArr(local, remote){
          if(!remote||!remote.length) return local;
          if(!local||!local.length) return remote;
          var ids = {};
          local.forEach(function(x){ if(x&&x.id) ids[x.id]=x; });
          remote.forEach(function(x){ if(x&&x.id&&!ids[x.id]) ids[x.id]=x; });
          return Object.values(ids);
        }
        var merged = {
          exams:       mergeArr(exams,       data.exams),
          glucose:     mergeArr(glucose,     data.glucose),
          ketones:     mergeArr(ketones,     data.ketones),
          supps:       mergeArr(supps,       data.supps),
          suppLog:     mergeArr(suppLog,     data.suppLog),
          foods:       mergeArr(foods,       data.foods),
          meals:       mergeArr(meals,       data.meals),
          exercises:   mergeArr(exercises,   data.exercises),
          exTemplates: mergeArr(exTemplates, data.exTemplates),
        };
        lsSet(LS.exams,merged.exams);           setExams(merged.exams);
        lsSet(LS.glucose,merged.glucose);       setGlucose(merged.glucose);
        lsSet(LS.ketones,merged.ketones);       setKetones(merged.ketones);
        lsSet(LS.supps,merged.supps);           setSupps(merged.supps);
        lsSet(LS.suppLog,merged.suppLog);       setSuppLog(merged.suppLog);
        lsSet(LS.foods,merged.foods);           setFoods(merged.foods);
        lsSet(LS.meals,merged.meals);           setMeals(merged.meals);
        lsSet(LS.exercises,merged.exercises);   setExercises(merged.exercises);
        lsSet(LS.exTemplates,merged.exTemplates); setExTemplates(merged.exTemplates);
        if(data.settings){ lsSet(LS.settings,data.settings); setSettings(data.settings); }
        /* Push merged data back to Firebase so cloud is also updated */
        setTimeout(function(){
          _applying=false;
          /* Push merged data back + start real-time listeners */
          fbPushAll({
            exams:merged.exams, glucose:merged.glucose, ketones:merged.ketones,
            supps:merged.supps, suppLog:merged.suppLog, foods:merged.foods,
            meals:merged.meals, exercises:merged.exercises, exTemplates:merged.exTemplates,
            settings:data.settings||{}
          }, function(){
            fbListenAll(function(key, arr){
              if(_applying) return;
              _applying=true;
              var setters={
                exams:function(a){lsSet(LS.exams,a);setExams(a);},
                glucose:function(a){lsSet(LS.glucose,a);setGlucose(a);},
                ketones:function(a){lsSet(LS.ketones,a);setKetones(a);},
                supps:function(a){lsSet(LS.supps,a);setSupps(a);},
                suppLog:function(a){lsSet(LS.suppLog,a);setSuppLog(a);},
                meals:function(a){lsSet(LS.meals,a);setMeals(a);},
                exercises:function(a){lsSet(LS.exercises,a);setExercises(a);},
              };
              if(setters[key]){ setters[key](arr); if(window._fbSetStatus) window._fbSetStatus("synced"); }
              setTimeout(function(){ _applying=false; }, 500);
            });
          });
        }, 1000);
        var count = 0;
        Object.values(merged).forEach(function(arr){ if(arr&&arr.length) count+=arr.length; });
        if(cb) cb(null, count);
      });
    });
  }

  function startBatch(){
    setBatchBusy(true); stopBatchRef.current=false;
    var cat=EXAM_CATS.find(function(c){return c.id===examCat;});
    var q=[].concat(batch);
    function next(i){
      if(i>=q.length||stopBatchRef.current){ setBatchBusy(false); return; }
      setBatch(function(prev){ return prev.map(function(b,j){ return j===i?Object.assign({},b,{status:"processing"}):b; }); });
      extractPdf(q[i].file, batchDate, cat)
        .then(function(r){ setBatch(function(prev){ return prev.map(function(b,j){ return j===i?Object.assign({},b,{status:"done",result:r}):b; }); }); next(i+1); })
        .catch(function(err){ setBatch(function(prev){ return prev.map(function(b,j){ return j===i?Object.assign({},b,{status:"error",err:err.message}):b; }); }); next(i+1); });
    }
    next(0);
  }

  function emptySuppForm(){
    return {id:"",name:"",brand:"",category:"",form:"Caps",purchaseDate:today(),store:"",price:"",expiryDate:"",totalServings:"",servingsPerDay:"1",startDate:today(),notes:""};
  }
  function suppStockInfo(s){
    var total=parseInt(s.totalServings)||0;
    var log=suppLog.filter(function(l){return l.suppId===s.id;});
    var used=log.reduce(function(sum,l){return sum+parseFloat(l.servings||1);},0);
    var remaining=Math.max(0,total-used);
    var pct=total>0?(remaining/total)*100:0;
    var spd=parseFloat(s.servingsPerDay)||1;
    var daysLeft=spd>0?Math.floor(remaining/spd):0;
    return {total:total,used:Math.round(used),remaining:Math.round(remaining),pct:pct,daysLeft:daysLeft};
  }
  function totalMonthlyCost(){

    var bf=parseFloat(s.bodyFat);
    var w=parseFloat(s.weight)||80, h=parseFloat(s.height)||175, a=parseFloat(s.age)||35;

  }

    var cp=parseFloat(settForm.carbPct)||40, pp=parseFloat(settForm.proPct)||30, fp=parseFloat(settForm.fatPct)||30;
    var pro=Math.round((cal*pp/100)/4);
    var carb=Math.round((cal*cp/100)/4);
    var fat=Math.round((cal*fp/100)/9);

  }

/* ═══════════════════ PWA INSTALL PROMPT ═══════════════════ */
function PWAInstallBanner(p) {
  var [show, setShow] = React.useState(false);
  var [deferredPrompt, setDeferredPrompt] = React.useState(null);

  React.useEffect(function() {
    function handler(e) {
      e.preventDefault();
      setDeferredPrompt(e);
      setShow(true);
    }
    window.addEventListener("beforeinstallprompt", handler);
    return function() { window.removeEventListener("beforeinstallprompt", handler); };
  }, []);

  if (!show) return null;
  return React.createElement("div", {
    style:{background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:56,zIndex:49}
  },
    React.createElement("span", {style:{fontSize:24}}, "📱"),
    React.createElement("div", {style:{flex:1,fontSize:13}},
      React.createElement("div", {style:{fontWeight:700}}, "Εγκατέστησε στο κινητό!"),
      React.createElement("div", {style:{opacity:.85,fontSize:12}}, "Λειτουργεί offline · Γρήγορη πρόσβαση")
    ),
    React.createElement("button", {
      onClick: function() {
        if(deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function(r) {
            if(r.outcome === "accepted") setShow(false);
            setDeferredPrompt(null);
          });
        }
      },
      style:{background:"#fff",color:"#2563eb",border:"none",borderRadius:10,padding:"7px 14px",fontWeight:700,fontSize:13,cursor:"pointer"}
    }, "Εγκατάσταση"),
    React.createElement("button", {
      onClick: function() { setShow(false); },
      style:{background:"rgba(255,255,255,.2)",color:"#fff",border:"none",borderRadius:8,padding:"7px 10px",fontSize:16,cursor:"pointer"}
    }, "✕")
  );
}

/* ═══════════════════ SERVICE WORKER ═══════════════════ */
if('serviceWorker' in navigator) {
  var swCode = [
    "const CACHE='ht-v3-9-4';",
    "const URLS=['/'];",
    "self.addEventListener('install',e=>{",
    "  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)));",
    "  self.skipWaiting();",
    "});",
    "self.addEventListener('activate',e=>{",
    "  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));",
    "  self.clients.claim();",
    "});",
    "self.addEventListener('fetch',e=>{",
    "  if(e.request.method!=='GET') return;",
    "  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));",
    "});"
  ].join('\n');
  var blob = new Blob([swCode], {type:'text/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}
